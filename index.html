        :root { --gold: #ffcc00; --money-green: #2ecc71; }

        .heading-font { font-family: 'Oswald', sans-serif; }
        .glow-text { text-shadow: 0 0 15px rgba(255, 204, 0, 0.4); }
        .btn-telegram {
            background: linear-gradient(90deg, #0088cc, #00aaff);
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.3);
            transition: all 0.3s ease;
        }
        .btn-telegram:hover { transform: scale(1.05); box-shadow: 0 15px 30px rgba(0, 136, 204, 0.5); }
        .money-rain { position: absolute; top: -10%; color: var(--money-green); font-size: 20px; pointer-events: none; z-index: 0; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>

    <script>
        function createMoney() {
            const icons = ['fa-dollar-sign', 'fa-coins', 'fa-money-bill'];
            const rain = document.createElement('i');
            rain.classList.add('fas', icons[Math.floor(Math.random() * icons.length)], 'money-rain');
            rain.style.left = Math.random() * 100 + 'vw';
            rain.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(rain);
            setTimeout(() => { rain.remove(); }, 5000);
        }
        setInterval(createMoney, 300);
    </script>
