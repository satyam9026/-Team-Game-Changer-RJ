<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Index Nitin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { --gold: #ffcc00; --money-green: #2ecc71; }
        body { background: #000; color: #fff; font-family: 'Poppins', sans-serif; overflow-x: hidden; }
        .heading-font { font-family: 'Oswald', sans-serif; }
        .glow-text { text-shadow: 0 0 15px rgba(255, 204, 0, 0.4); }
        .btn-telegram {
            background: linear-gradient(90deg, #0088cc, #00aaff);
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.3);
            transition: all 0.3s ease;
        }
        .btn-telegram:hover { transform: scale(1.05); box-shadow: 0 15px 30px rgba(0, 136, 204, 0.5); }
        .money-rain { position: absolute; top: -10%; color: var(--money-green); font-size: 20px; pointer-events: none; z-index: 0; animation: fall linear infinite; }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>

<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="relative z-10 w-full max-w-2xl text-center space-y-6">
        
        <div class="flex justify-center">
            <img src="https://i.imgur.com/YOUR_IMAGE_ID.png" alt="SLC Logo" class="w-32 h-32 md:w-48 md:h-48 object-contain">
        </div>

        <div class="uppercase overflow-hidden px-2">
            <h1 class="heading-font text-4xl md:text-7xl font-black text-white glow-text">
                Index Nitin
            </h1>
        </div>

        <div class="pt-2">
            <a href="https://kesug.github.io/tk/" target="_blank"
                class="btn-telegram inline-flex items-center gap-3 px-8 py-4 md:px-12 md:py-5 rounded-full text-xl md:text-3xl font-bold text-white uppercase tracking-tighter">
                <i class="fab fa-telegram"></i>
                Join Telegram
            </a>
        </div>
    </div>

    <script>
        function createMoney() {
            const icons = ['fa-dollar-sign', 'fa-coins', 'fa-money-bill'];
            const rain = document.createElement('i');
            rain.classList.add('fas', icons[Math.floor(Math.random() * icons.length)], 'money-rain');
            rain.style.left = Math.random() * 100 + 'vw';
            rain.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(rain);
            setTimeout(() => { rain.remove(); }, 5000);
        }
        setInterval(createMoney, 300);
    </script>
</body>
</html>
