<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vipin Singh Prediction | Loss Recovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --gold: #ffcc00;
            --money-green: #2ecc71;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        .heading-font {
            font-family: 'Oswald', sans-serif;
        }

        .glow-text {
            text-shadow: 0 0 15px rgba(255, 204, 0, 0.4);
        }

        .money-gradient {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        }

        .btn-telegram {
            background: linear-gradient(90deg, #0088cc, #00aaff);
            box-shadow: 0 10px 20px rgba(0, 136, 204, 0.3);
            transition: all 0.3s transform ease;
        }

        .btn-telegram:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(0, 136, 204, 0.5);
        }

        /* Money Rain Animation */
        .money-rain {
            position: absolute;
            top: -10%;
            color: var(--money-green);
            font-size: 20px;
            pointer-events: none;
            z-index: 0;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to {
                transform: translateY(110vh) rotate(360deg);
            }
        }
    </style>
</head>

<body class="flex flex-col items-center justify-center min-h-screen p-4">

    <div class="relative z-10 w-full max-w-2xl text-center space-y-8">

        <div class="space-y-2 uppercase">
            <h3
                class="flex items-center justify-center gap-2 text-xl md:text-2xl font-bold text-[#2ecc71] tracking-wide">
                <i class="fas fa-money-bill-wave"></i>
                All Platform Loss Recover
            </h3>
            <h1 class="heading-font text-4xl md:text-6xl font-black text-white glow-text">
                Best Prediction
            </h1>
            <h2
                class="text-lg md:text-2xl font-semibold tracking-widest text-[#ffcc00] flex items-center justify-center gap-3">
                <i class="fas fa-crown"></i>

                Team Game Changer RJ
                <i class="fas fa-money-bill-wave"></i>
            </h2>
        </div>

        <div class="py-4">
            <a href="https://t.me/+YjzARA9vmZNhMDJl" target="_blank"
                class="btn-telegram inline-flex items-center gap-4 px-12 py-5 rounded-full text-2xl md:text-3xl font-bold text-white uppercase tracking-tighter">
                <i class="fab fa-telegram"></i>
                Join Telegram
            </a>
        </div>

        <div class="relative group mx-auto max-w-sm md:max-w-md">
            <div
                class="absolute -inset-1 bg-gradient-to-r from-yellow-600 to-green-600 rounded-2xl blur opacity-25 group-hover:opacity-50 transition duration-1000">
            </div>

            <div class="relative bg-[#111] p-2 rounded-2xl border border-white/10 shadow-2xl">
                <img src="image.png" alt="Vipin Singh Money" class="w-full h-auto rounded-xl">
            </div>

        </div>

    </div>

    <script>
        function createMoney() {
            const icons = ['fa-dollar-sign', 'fa-coins', 'fa-money-bill'];
            const rain = document.createElement('i');
            rain.classList.add('fas', icons[Math.floor(Math.random() * icons.length)], 'money-rain');

            rain.style.left = Math.random() * 100 + 'vw';
            rain.style.animationDuration = (Math.random() * 2 + 3) + 's';
            rain.style.opacity = Math.random();

            document.body.appendChild(rain);

            setTimeout(() => {
                rain.remove();
            }, 5000);
        }

        // Create a bill every 300ms
        setInterval(createMoney, 300);
    </script>

</body>

</html>
